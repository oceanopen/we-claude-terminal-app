<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded square background (same as prod) -->
  <rect width="512" height="512" rx="108" fill="#2ECC71"/>

  <!-- Upper eyelid -->
  <path d="M 76 256 Q 256 24 436 256"
        stroke="#FFFFFF" stroke-width="40"
        stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Lower eyelid -->
  <path d="M 76 256 Q 256 488 436 256"
        stroke="#FFFFFF" stroke-width="40"
        stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Iris (teal ring formed by overlap with pupil) -->
  <circle cx="256" cy="256" r="100" fill="#1ABC9C"/>

  <!-- Pupil (dark green) -->
  <circle cx="256" cy="256" r="60" fill="#0F5132"/>

  <!-- Highlight (large, upper-left) -->
  <circle cx="228" cy="228" r="16" fill="#FFFFFF"/>

  <!-- Highlight (small, lower-right) -->
  <circle cx="284" cy="276" r="8" fill="#FFFFFF"/>

  <!-- DEV badge: 右下角红色实心圆 + 白色描边，风格对齐 we-health-tick-app/alerting-dev.svg -->
  <circle cx="380" cy="380" r="85" fill="#EF4444" stroke="#FFFFFF" stroke-width="24"/>
</svg>
